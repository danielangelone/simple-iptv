<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
        }
        .f {
            border: 5px solid #333;
        }
        .f.s {
            border-color: #0f0;
            background: #030;
        }
        #s1, #s2, #s3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #s1 { 
            background: #111; 
            z-index: 10;
            padding: 100px;
            box-sizing: border-box;
        }
        #s2 { 
            display: none;
            z-index: 5;
        }
        #s3 { 
            display: none; 
            background: #222;
            z-index: 8;
            width: 400px;
            overflow-y: auto;
        }
        input, button, .c {
            display: block;
            width: 100%;
            margin: 20px 0;
            padding: 30px;
            font-size: 28px;
            background: #222;
            color: #fff;
            border: 5px solid #444;
        }
        button {
            width: auto;
            display: inline-block;
            margin-right: 20px;
            min-width: 250px;
        }
        .c {
            cursor: pointer;
        }
        video {
            width: 100%;
            height: 100%;
        }
        #d {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #f00;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            z-index: 9999;
            max-width: 800px;
            max-height: 200px;
            overflow: auto;
        }
        #o {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            display: none;
            z-index: 100;
            border: 2px solid #0f0;
        }
    </style>
</head>
<body>
    <div id="d">START</div>
    <div id="s1">
        <h1 style="color:#0f0; font-size:48px;">SIMPLE IPTV</h1>
        <p style="font-size:24px; color:#888;">⬆⬇ Navegar | OK Confirmar</p>
        <input id="u" class="f" value="https://iptv-org.github.io/iptv/categories/news.m3u">
        <div>
            <button id="b1" class="f s">CARREGAR</button>
            <button id="b2" class="f">LIMPAR</button>
        </div>
        <p id="e" style="color:#f55; font-size:24px; margin-top:30px;"></p>
    </div>
    <div id="s2">
        <video id="v" autoplay></video>
    </div>
    <div id="s3"></div>
    <div id="o">
        <div id="on" style="color:#0f0; font-size:32px;"></div>
        <div id="ou" style="color:#888; font-size:16px;"></div>
    </div>
    <script>
var u = document.getElementById('u');
var b1 = document.getElementById('b1');
var b2 = document.getElementById('b2');
var s1 = document.getElementById('s1');
var s2 = document.getElementById('s2');
var s3 = document.getElementById('s3');
var v = document.getElementById('v');
var o = document.getElementById('o');
var on = document.getElementById('on');
var ou = document.getElementById('ou');
var e = document.getElementById('e');
var d = document.getElementById('d');
d.style.display = 'none';
var focos = [];
var fIndex = 0;
var canais = [];
var canalAtual = 0;
var listaAberta = false;
focos = [u, b1, b2];
fIndex = 1;
atualizarFoco();
function atualizarFoco() {
    var todos = document.querySelectorAll('.f, .c');
    for(var i=0; i<todos.length; i++) {
        todos[i].className = todos[i].className.replace(' s', '');
    }
    if(focos[fIndex]) {
        focos[fIndex].className += ' s';
    }
}
document.onkeydown = function(evt) {
    var k = evt.keyCode;
    evt.preventDefault();
    var t = '';
    if(k==13 || k==29443) t='OK';
    else if(k==38 || k==29460) t='CIMA';
    else if(k==40 || k==29461) t='BAIXO';
    else if(k==37 || k==29462) t='ESQ';
    else if(k==461 || k==29485) t='BACK';
    else if(k==415) t='PLAY';
    else if(k==19) t='PAUSE';
    if(s1.style.display != 'none') {
        if(t=='CIMA') { fIndex = Math.max(0, fIndex-1); atualizarFoco(); }
        else if(t=='BAIXO') { fIndex = Math.min(2, fIndex+1); atualizarFoco(); }
        else if(t=='OK') ativarURL();
        return;
    }
    if(listaAberta) {
        processarLista(t);
        return;
    }
    processarPlayer(t);
};
function ativarURL() {
    var el = focos[fIndex];
    if(el == u) u.focus();
    else if(el == b1) carregar();
    else if(el == b2) { u.value = ''; u.focus(); }
}
function carregar() {
    var url = u.value;
    e.innerHTML = 'Carregando...';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if(xhr.readyState == 4 && xhr.status == 200) {
            parseM3U(xhr.responseText);
        }
    };
    xhr.send();
}
function parseM3U(txt) {
    var canaisFixos = [
        {n: 'Al Jazeera 480p', u: 'https://live-hls-apps-aje-fa.getaj.net/AJE/05.m3u8'},
        {n: 'Al Jazeera 720p', u: 'https://live-hls-apps-aje-fa.getaj.net/AJE/04.m3u8'}
    ];
    var linhas = txt.split('\n');
    canais = [];
    for(var i=0; i<canaisFixos.length; i++) {
        canais.push(canaisFixos[i]);
    }
    for(var i=0; i<linhas.length; i++) {
        var lin = linhas[i].trim();
        if(lin.indexOf('#EXTINF:') == 0) {
            var nome = 'Canal';
            var p = lin.lastIndexOf(',');
            if(p > 0) nome = lin.substring(p+1).trim();
            canais.push({n: nome, u: ''});
        }
        else if((lin.indexOf('http') == 0 || lin.indexOf('rtmp') == 0) && canais.length > canaisFixos.length && canais[canais.length-1].u == '') {
            canais[canais.length-1].u = lin;
        }
    }
    var temp = [];
    for(var i=0; i<canais.length; i++) {
        if(canais[i].u != '' || i < canaisFixos.length) temp.push(canais[i]);
    }
    canais = temp;
    e.innerHTML = canais.length + ' canais (2 fixos)';
    if(canais.length > 0) {
        setTimeout(iniciarPlayer, 500);
    }
}
function iniciarPlayer() {
    s1.style.display = 'none';
    s2.style.display = 'block';
    s3.innerHTML = '';
    for(var i=0; i<canais.length; i++) {
        var div = document.createElement('div');
        div.className = 'c f';
        div.innerHTML = (i+1) + '. ' + canais[i].n;
        s3.appendChild(div);
    }
    tocar(0);
}
function mostrarLista() {
    listaAberta = true;
    s3.style.display = 'block';
    var items = s3.querySelectorAll('.c');
    focos = [];
    for(var i=0; i<items.length; i++) {
        focos.push(items[i]);
    }
    fIndex = canalAtual;
    if(fIndex >= focos.length) fIndex = focos.length - 1;
    if(fIndex < 0) fIndex = 0;
    atualizarFoco();
    if(focos[fIndex]) {
        focos[fIndex].scrollIntoView({block: 'center'});
    }
}
function esconderLista() {
    listaAberta = false;
    s3.style.display = 'none';
    focos = [];
    fIndex = 0;
}
function processarLista(t) {
    if(focos.length == 0) {
        mostrarLista();
        return;
    }
    if(t=='CIMA') {
        if(fIndex > 0) {
            fIndex--;
            atualizarFoco();
            if(focos[fIndex]) focos[fIndex].scrollIntoView({block: 'center'});
        }
    }
    else if(t=='BAIXO') {
        if(fIndex < focos.length - 1) {
            fIndex++;
            atualizarFoco();
            if(focos[fIndex]) focos[fIndex].scrollIntoView({block: 'center'});
        }
    }
    else if(t=='OK') {
        if(fIndex >= 0 && fIndex < canais.length) {
            tocar(fIndex);
        }
    }
    else if(t=='ESQ' || t=='BACK') {
        esconderLista();
    }
}
function processarPlayer(t) {
    if(t=='OK') {
        if(v.paused) v.play(); else v.pause();
        mostrarOverlay();
    }
    else if(t=='CIMA') {
        if(canalAtual > 0) tocar(canalAtual-1);
    }
    else if(t=='BAIXO') {
        if(canalAtual < canais.length-1) tocar(canalAtual+1);
    }
    else if(t=='ESQ') {
        mostrarLista();
    }
    else if(t=='BACK') {
        voltarURL();
    }
    else if(t=='PLAY') {
        v.play();
        mostrarOverlay();
    }
    else if(t=='PAUSE') {
        v.pause();
        mostrarOverlay();
    }
}
function tocar(idx) {
    if(idx < 0 || idx >= canais.length) return;
    canalAtual = idx;
    var c = canais[idx];
    on.innerHTML = c.n;
    ou.innerHTML = 'Canal ' + (idx+1) + ' / ' + canais.length;
    o.style.display = 'block';
    v.src = c.u;
    v.setAttribute('preload', 'auto');
    setTimeout(function() {
        v.play();
    }, 100);
    setTimeout(function(){ o.style.display = 'none'; }, 3000);
}
function mostrarOverlay() {
    on.innerHTML = canais[canalAtual].n;
    ou.innerHTML = v.paused ? 'PAUSADO' : 'TOCANDO';
    o.style.display = 'block';
    setTimeout(function(){ o.style.display = 'none'; }, 2000);
}
function voltarURL() {
    v.pause();
    v.src = '';
    s2.style.display = 'none';
    s3.style.display = 'none';
    listaAberta = false;
    s1.style.display = 'block';
    focos = [u, b1, b2];
    fIndex = 1;
    atualizarFoco();
}
v.onerror = function() {
    on.innerHTML = 'ERRO NO CANAL';
    ou.innerHTML = 'Tentando reconectar...';
    o.style.display = 'block';
};
v.onwaiting = function() {
    on.innerHTML = canais[canalAtual].n;
    ou.innerHTML = 'Carregando...';
    o.style.display = 'block';
};
v.onplaying = function() {
    setTimeout(function(){ o.style.display = 'none'; }, 1000);
};
v.onpause = function() {
    on.innerHTML = canais[canalAtual].n;
    ou.innerHTML = 'PAUSADO';
    o.style.display = 'block';
    setTimeout(function(){ o.style.display = 'none'; }, 2000);
};
    </script>
</body>
</html>
