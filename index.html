<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --accent: #4fc3f7;
            --accent-dark: #0288d1;
        }

        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            margin: 0;
            padding: 0;
            background: #05070f;
            color: #e8eaf0;
            font-family: 'Rajdhani', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        /* Scanline */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
            pointer-events: none;
            z-index: 9000;
        }

        .f {
            transition: all 0.2s ease;
        }
        .f.s {
            border-color: var(--accent);
            background: rgba(79,195,247,0.1);
            box-shadow: 0 0 0 3px rgba(79,195,247,0.3);
        }

        /* Screens */
        #s1, #s2, #s3 {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #s1 {
            background: #05070f;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .logo-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo-main { font-size: clamp(42px, 8vw, 72px); font-weight: 700; letter-spacing: 6px; }
        .logo-tag { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--accent); }

        #u {
            width: 100%;
            max-width: 620px;
            padding: 18px 24px;
            font-size: 18px;
            background: #0a0e1c;
            border: 2px solid #1e2540;
            color: #c8d8f0;
            font-family: 'Share Tech Mono', monospace;
            margin: 20px 0;
        }

        .btn-row {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 620px;
        }
        button {
            flex: 1;
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid #1e2540;
            background: #0a0e1c;
            color: #e8eaf0;
            cursor: pointer;
        }
        #b1.s { border-color: var(--accent); color: var(--accent); }

        #s2 {
            display: none;
            background: #000;
            z-index: 5;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Lista de canais - responsiva */
        #s3 {
            display: none;
            z-index: 20;
            background: rgba(5,7,15,0.98);
            overflow-y: auto;
            padding: 20px 0;
        }
        @media (min-width: 768px) {
            #s3 {
                width: 420px;
                border-right: 1px solid #1e2540;
            }
            #s3::before {
                content: '';
                position: absolute;
                right: -4px; top: 0; bottom: 0;
                width: 4px;
                background: linear-gradient(180deg, transparent, var(--accent) 30%, var(--accent-dark) 70%, transparent);
            }
        }

        .c {
            padding: 16px 24px;
            font-size: 20px;
            border-bottom: 1px solid #0d1120;
            color: #8090b0;
            cursor: pointer;
        }
        .c.s {
            background: rgba(79,195,247,0.12);
            color: white;
            border-left: 5px solid var(--accent);
        }

        /* OSD Overlay */
        #o {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5,7,15,0.92);
            border: 2px solid var(--accent);
            padding: 16px 28px;
            border-radius: 8px;
            display: none;
            z-index: 100;
            min-width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        #on { font-size: 28px; font-weight: 700; }
        #ou { font-size: 15px; color: var(--accent); margin-top: 4px; font-family: 'Share Tech Mono', monospace; }

        /* Fullscreen button */
        #fsBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 150;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            display: none;
        }

        @media (max-width: 767px) {
            #o { bottom: 100px; min-width: 280px; }
            .c { font-size: 18px; padding: 18px 20px; }
        }
    </style>
</head>
<body>

    <div id="s1">
        <div class="logo-row">
            <span class="logo-main">IPTV</span>
            <span class="logo-tag">PLAYER</span>
        </div>
        <input id="u" class="f" value="https://danielangelone.github.io/simple-iptv/list.m3u">
        <div class="btn-row">
            <button id="b1" class="f s">▶ CARREGAR LISTA</button>
            <button id="b2" class="f">LIMPAR</button>
        </div>
        <p id="e" style="margin-top:20px; font-family:monospace; color:#4fc3f7;"></p>
    </div>

    <div id="s2">
        <video id="v" autoplay playsinline></video>
    </div>

    <div id="s3"></div>

    <div id="o">
        <div id="on"></div>
        <div id="ou"></div>
    </div>

    <button id="fsBtn">⛶</button>

    <script>
        // Variáveis principais
        const u = document.getElementById('u');
        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');
        const s3 = document.getElementById('s3');
        const v = document.getElementById('v');
        const o = document.getElementById('o');
        const on = document.getElementById('on');
        const ou = document.getElementById('ou');
        const e = document.getElementById('e');
        const fsBtn = document.getElementById('fsBtn');

        let canais = [];
        let canalAtual = 0;
        let listaAberta = false;
        let focos = [];
        let fIndex = 0;
        let touchStartX = 0;

        // Foco inicial
        focos = [u, b1, b2];
        fIndex = 1;

        function atualizarFoco() {
            document.querySelectorAll('.f, .c').forEach(el => el.classList.remove('s'));
            if (focos[fIndex]) focos[fIndex].classList.add('s');
        }

        // Teclado (mantido para TV / desktop)
        document.addEventListener('keydown', (evt) => {
            evt.preventDefault();
            let t = '';
            if ([13, 29443].includes(evt.keyCode)) t = 'OK';
            else if ([38, 29460].includes(evt.keyCode)) t = 'CIMA';
            else if ([40, 29461].includes(evt.keyCode)) t = 'BAIXO';
            else if ([37, 29462].includes(evt.keyCode)) t = 'ESQ';
            else if ([39, 29463].includes(evt.keyCode)) t = 'DIR';
            else if ([461, 29485].includes(evt.keyCode)) t = 'BACK';

            if (s1.style.display !== 'none') {
                if (t === 'CIMA') { fIndex = Math.max(0, fIndex-1); atualizarFoco(); }
                if (t === 'BAIXO') { fIndex = Math.min(2, fIndex+1); atualizarFoco(); }
                if (t === 'OK') ativarURL();
                return;
            }

            if (listaAberta) {
                processarLista(t);
            } else {
                processarPlayer(t);
            }
        });

        function ativarURL() {
            if (focos[fIndex] === b1) carregar();
            else if (focos[fIndex] === b2) { u.value = ''; }
        }

        function carregar() {
            const url = u.value.trim();
            if (!url) return;
            e.textContent = 'CARREGANDO...';
            fetch(url)
                .then(r => r.text())
                .then(txt => parseM3U(txt))
                .catch(() => e.textContent = 'ERRO AO CARREGAR LISTA');
        }

        function parseM3U(txt) {
            // Mesmo parse anterior (mantido simplificado)
            const canaisFixos = [
                {n: 'Al Jazeera 480p', u: 'https://live-hls-apps-aje-fa.getaj.net/AJE/05.m3u8'},
                {n: 'Al Jazeera 720p', u: 'https://live-hls-apps-aje-fa.getaj.net/AJE/04.m3u8'}
            ];

            canais = [...canaisFixos];
            const linhas = txt.split('\n');
            let canalTemp = null;

            for (let lin of linhas) {
                lin = lin.trim();
                if (lin.startsWith('#EXTINF:')) {
                    let nome = lin.split(',').pop().trim() || 'Canal';
                    canalTemp = {n: nome, u: ''};
                } else if (lin.startsWith('http') && canalTemp) {
                    canalTemp.u = lin;
                    canais.push(canalTemp);
                    canalTemp = null;
                }
            }

            e.textContent = `${canais.length} canais carregados`;
            setTimeout(iniciarPlayer, 300);
        }

        function iniciarPlayer() {
            s1.style.display = 'none';
            s2.style.display = 'block';
            fsBtn.style.display = 'block';

            s3.innerHTML = '';
            canais.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'c f';
                div.textContent = `${i+1}. ${c.n}`;
                div.onclick = () => tocar(i);
                s3.appendChild(div);
            });

            tocar(0);
        }

        function mostrarLista() {
            listaAberta = true;
            s3.style.display = 'block';
            focos = Array.from(s3.querySelectorAll('.c'));
            fIndex = canalAtual;
            atualizarFoco();
            if (focos[fIndex]) focos[fIndex].scrollIntoView({block: 'center'});
        }

        function esconderLista() {
            listaAberta = false;
            s3.style.display = 'none';
        }

        function processarLista(t) {
            if (t === 'CIMA' && fIndex > 0) fIndex--;
            else if (t === 'BAIXO' && fIndex < focos.length-1) fIndex++;
            else if (t === 'OK' && focos[fIndex]) tocar(fIndex);
            else if (t === 'ESQ' || t === 'BACK') esconderLista();

            atualizarFoco();
            if (focos[fIndex]) focos[fIndex].scrollIntoView({block:'center'});
        }

        function processarPlayer(t) {
            if (t === 'OK') {
                v.paused ? v.play() : v.pause();
            } else if (t === 'CIMA') {
                if (canalAtual > 0) tocar(canalAtual - 1);
            } else if (t === 'BAIXO') {
                if (canalAtual < canais.length - 1) tocar(canalAtual + 1);
            } else if (t === 'ESQ') mostrarLista();
            else if (t === 'BACK') voltarURL();
        }

        function tocar(idx) {
            if (idx < 0 || idx >= canais.length) return;
            canalAtual = idx;
            const c = canais[idx];

            on.textContent = c.n;
            ou.textContent = `CANAL ${idx+1} / ${canais.length}`;
            o.style.display = 'block';

            v.pause();
            v.src = c.u;
            v.load();

            setTimeout(() => v.play().catch(()=>{}), 100);

            setTimeout(() => o.style.display = 'none', 2500);
            esconderLista();
        }

        function voltarURL() {
            v.pause();
            v.src = '';
            s2.style.display = 'none';
            s3.style.display = 'none';
            fsBtn.style.display = 'none';
            s1.style.display = 'flex';
            focos = [u, b1, b2];
            fIndex = 1;
            atualizarFoco();
        }

        // === TOUCH & GESTOS MOBILE ===
        let lastTap = 0;

        s2.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        s2.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > 80) { // swipe threshold
                if (diff > 0) { // swipe left → próximo canal
                    if (canalAtual < canais.length - 1) tocar(canalAtual + 1);
                } else { // swipe right → canal anterior
                    if (canalAtual > 0) tocar(canalAtual - 1);
                }
            } else {
                // toque simples = mostrar overlay / play-pause
                const now = Date.now();
                if (now - lastTap < 300) {
                    // double tap → fullscreen
                    toggleFullscreen();
                } else {
                    v.paused ? v.play() : v.pause();
                    o.style.display = 'block';
                    setTimeout(() => o.style.display = 'none', 1500);
                }
                lastTap = now;
            }
        });

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (s2.requestFullscreen) s2.requestFullscreen();
                else if (s2.webkitRequestFullscreen) s2.webkitRequestFullscreen();
                else if (s2.msRequestFullscreen) s2.msRequestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        fsBtn.addEventListener('click', toggleFullscreen);

        // Eventos do vídeo
        v.onwaiting = () => { ou.textContent = 'CARREGANDO...'; o.style.display = 'block'; };
        v.onplaying = () => setTimeout(() => o.style.display = 'none', 800);
        v.onerror = () => { on.textContent = 'ERRO'; ou.textContent = 'Falha ao reproduzir'; o.style.display = 'block'; };

        // Botões da tela inicial
        b1.addEventListener('click', carregar);
        b2.addEventListener('click', () => u.value = '');

        // Inicia com foco
        atualizarFoco();
    </script>
</body>
</html>
